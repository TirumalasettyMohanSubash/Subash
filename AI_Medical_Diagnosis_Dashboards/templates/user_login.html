<!DOCTYPE html>
<html lang="en">
<head>
    <title>User Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#dbeafe,#eff6ff,#f0fdf4);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:400px;
            background:rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding:35px;
            border-radius:20px;
            box-shadow:0 12px 30px rgba(0,0,0,0.18);
            animation:fadeIn 0.8s ease-in-out;
        }

        h2{
            text-align:center;
            color:#0f172a;
            margin-bottom:10px;
            font-size:30px;
        }

        .subtitle{
            text-align:center;
            color:#64748b;
            margin-bottom:25px;
            font-size:14px;
        }

        input{
            width:100%;
            padding:14px;
            margin:12px 0;
            border:1px solid #cbd5e1;
            border-radius:12px;
            font-size:15px;
            transition:0.3s;
        }

        input:focus{
            border-color:#2563eb;
            box-shadow:0 0 8px rgba(37,99,235,0.2);
            outline:none;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(to right,#2563eb,#1d4ed8);
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            box-shadow:0 5px 15px rgba(37,99,235,0.3);
        }

        button:hover{
            transform:translateY(-2px);
            opacity:0.95;
        }

        .link{
            display:block;
            margin-top:18px;
            text-align:center;
            text-decoration:none;
            color:#16a34a;
            font-weight:bold;
        }

        .link:hover{
            text-decoration:underline;
        }

        .error{
            background:#fee2e2;
            color:#b91c1c;
            padding:10px;
            border-radius:10px;
            margin-bottom:15px;
            text-align:center;
            font-size:14px;
        }

        .icon{
            text-align:center;
            font-size:45px;
            margin-bottom:10px;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="icon">🩺</div>
    <h2>User Login</h2>
    <p class="subtitle">AI Disease Prediction & Medical Assistance Portal</p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post">
        <input type="email" name="email" placeholder="📧 Enter your email" required>

        <input type="password" name="password" placeholder="🔒 Enter your password" required>

        <button type="submit">Login to Dashboard</button>
    </form>

    <a href="/register" class="link">New User? Create an Account</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Medical Diagnosis System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#74ebd5,#ACB6E5);
            min-height:100vh;
            display:flex;
            transition:0.5s;
        }

        .sidebar{
            width:240px;
            background:rgba(255,255,255,0.18);
            backdrop-filter:blur(12px);
            padding:30px 20px;
            box-shadow:4px 0 15px rgba(0,0,0,0.1);
            transition:0.5s;
        }

        .sidebar h2{
            color:white;
            text-align:center;
            margin-bottom:30px;
            font-size:24px;
        }

        .menu-btn{
            display:block;
            width:100%;
            margin:15px 0;
            padding:14px;
            border:none;
            border-radius:12px;
            text-decoration:none;
            color:white;
            font-weight:bold;
            text-align:center;
            transition:0.3s;
            cursor:pointer;
        }

        .profile{background:#2563eb;}
        .history{background:#16a34a;}
        .chat{background:#0ea5e9;}
        .darkmode{background:#111827;}
        .logout{background:#dc2626;}

        .menu-btn:hover{
            transform:translateX(5px);
            opacity:0.92;
        }

        .main{
            flex:1;
            padding:30px;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:760px;
            background:rgba(255,255,255,0.16);
            backdrop-filter:blur(15px);
            border-radius:25px;
            padding:30px;
            box-shadow:0 8px 30px rgba(0,0,0,0.25);
            color:#fff;
            animation:fadeIn 0.8s ease;
            transition:0.5s;
        }

        @keyframes fadeIn{
            from{opacity:0;transform:translateY(-20px);}
            to{opacity:1;transform:translateY(0);}
        }

        h1{
            text-align:center;
            margin-bottom:8px;
            font-size:32px;
        }

        .subtitle{
            text-align:center;
            margin-bottom:20px;
            color:#f1f1f1;
        }

        .weather-card{
            background:rgba(255,255,255,0.22);
            padding:18px;
            border-radius:15px;
            margin-bottom:20px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
            transition:0.5s;
        }

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:600;
        }

        input,select{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            outline:none;
        }

        .full{
            grid-column:span 2;
        }

        .predict-btn,.voice-btn{
            width:100%;
            padding:13px;
            margin-top:12px;
            border:none;
            border-radius:10px;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .predict-btn{background:#007bff;}
        .voice-btn{background:#17a2b8;}

        #loading{
            display:none;
            text-align:center;
            margin-top:10px;
            color:yellow;
            font-weight:bold;
        }

        #suggestions li{
            list-style:none;
            background:white;
            color:black;
            margin:2px 0;
            padding:5px;
            border-radius:5px;
            cursor:pointer;
        }

        .chatbox{
            margin-top:25px;
            background:rgba(255,255,255,0.2);
            padding:18px;
            border-radius:15px;
            transition:0.5s;
        }

        .chat-row{
            display:flex;
            gap:10px;
        }

        .chat-row input{
            flex:1;
        }

        .chat-row button{
            width:120px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
        }

        #chatResponse{
            margin-top:15px;
            background:rgba(0,0,0,0.15);
            padding:12px;
            border-radius:10px;
            min-height:40px;
            line-height:1.6;
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <h2>🩺 Dashboard</h2>

    <a href="/profile" class="menu-btn profile">👤 My Profile</a>
    <a href="/history" class="menu-btn history">📜 View History</a>
    <a href="#chatbot" class="menu-btn chat">🤖 AI Chatbot</a>
    <button class="menu-btn darkmode" id="themeBtn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    <a href="/user_logout" class="menu-btn logout">🚪 Logout</a>
</div>

<div class="main">
<div class="container" id="container">

    <h1><i class="fas fa-heartbeat"></i> AI Medical Diagnosis</h1>
    <p class="subtitle">Smart Disease Prediction & Personalized Healthcare Assistant</p>

    <div class="weather-card" id="weatherCard">
        <h3>☀ Today's Health Tip</h3>
        <p id="weatherText"></p>
        <p id="healthTip"></p>
    </div>

    <form action="/predict" method="post" onsubmit="showLoading()">

        <div class="full">
            <label><i class="fas fa-search"></i> Search Symptom</label>
            <input type="text" id="symptom" onkeyup="suggestSymptoms()" placeholder="Type symptom...">
            <ul id="suggestions"></ul>
        </div>

        <div class="form-grid">
            <div><label>Fever</label><select name="fever"><option value="1">Yes</option><option value="0">No</option></select></div>
            <div><label>Cough</label><select name="cough"><option value="1">Yes</option><option value="0">No</option></select></div>
            <div><label>Headache</label><select name="headache"><option value="1">Yes</option><option value="0">No</option></select></div>
            <div><label>Fatigue</label><select name="fatigue"><option value="1">Yes</option><option value="0">No</option></select></div>
            <div><label>Body Pain</label><select name="body_pain"><option value="1">Yes</option><option value="0">No</option></select></div>
            <div><label>Sore Throat</label><select name="sore_throat"><option value="1">Yes</option><option value="0">No</option></select></div>
            <div><label>Breathing Issue</label><select name="breathing_issue"><option value="1">Yes</option><option value="0">No</option></select></div>
            <div><label>Blood Pressure</label><input type="number" name="bp_level" required></div>
            <div><label>Sugar Level</label><input type="number" name="sugar_level" required></div>
            <div><label>Heart Rate</label><input type="number" name="heart_rate" required></div>
        </div>

        <button type="submit" class="predict-btn"><i class="fas fa-stethoscope"></i> Predict Disease</button>
        <p id="loading">⏳ Predicting... Please wait...</p>
    </form>

    <button class="voice-btn" onclick="startVoice()">🎤 Speak Symptom</button>

    <div class="chatbox" id="chatbot">
        <h3>🤖 AI Health Chatbot</h3>
        <div class="chat-row">
            <input type="text" id="chatInput" placeholder="Ask your health question...">
            <button onclick="sendMessage()">Send</button>
        </div>
        <p id="chatResponse">Your AI medical assistant response will appear here...</p>
    </div>

</div>
</div>

<script>
function showLoading(){
    document.getElementById("loading").style.display="block";
    document.getElementById("loading").innerText="⏳ Predicting... Please wait...";
}

const symptoms=["fever","cough","headache","fatigue","body pain","sore throat","breathing issue","cold","weakness"];

function suggestSymptoms(){
    let input=document.getElementById("symptom").value.toLowerCase();
    let list=document.getElementById("suggestions");
    list.innerHTML="";
    symptoms.forEach(s=>{
        if(s.includes(input) && input!=""){
            let li=document.createElement("li");
            li.innerText=s;
            li.onclick=()=>{
                document.getElementById("symptom").value=s;
                list.innerHTML="";
            }
            list.appendChild(li);
        }
    });
}

function startVoice(){
    let recognition = new webkitSpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;

    recognition.onstart = function(){
        document.getElementById("loading").style.display="block";
        document.getElementById("loading").innerText="🎤 Listening... Speak now";
    };

    recognition.onresult = function(event){
        let text = event.results[0][0].transcript;
        document.getElementById("chatInput").value = text;
        document.getElementById("symptom").value = text;
        document.getElementById("loading").innerText="🤖 Processing your voice symptom...";
        sendMessage();
    };

    recognition.onerror = function(){
        document.getElementById("loading").style.display="none";
        alert("Voice recognition failed. Please try again.");
    };

    recognition.onend = function(){
        setTimeout(()=>{
            document.getElementById("loading").style.display="none";
        },1500);
    };

    recognition.start();
}

function sendMessage(){
    let msg = document.getElementById("chatInput").value;

    fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:msg})
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("chatResponse").innerText="🤖 " + data.response;
    });
}

function toggleDarkMode(){
    let btn = document.getElementById("themeBtn");
    let sidebar = document.getElementById("sidebar");
    let container = document.getElementById("container");
    let weather = document.getElementById("weatherCard");
    let chat = document.getElementById("chatbot");

    if(btn.innerHTML.includes("Dark")){
        document.body.style.background = "linear-gradient(135deg,#111827,#1f2937,#000000)";
        sidebar.style.background = "rgba(0,0,0,0.35)";
        container.style.background = "rgba(0,0,0,0.35)";
        weather.style.background = "rgba(0,0,0,0.30)";
        chat.style.background = "rgba(0,0,0,0.30)";
        btn.innerHTML = "☀ Light Mode";
    }else{
        document.body.style.background = "linear-gradient(135deg,#74ebd5,#ACB6E5)";
        sidebar.style.background = "rgba(255,255,255,0.18)";
        container.style.background = "rgba(255,255,255,0.16)";
        weather.style.background = "rgba(255,255,255,0.22)";
        chat.style.background = "rgba(255,255,255,0.2)";
        btn.innerHTML = "🌙 Dark Mode";
    }
}

const tips = [
    {temp:"37°C", weather:"Sunny", msg:"Drink more water and avoid dehydration today."},
    {temp:"29°C", weather:"Cloudy", msg:"Maintain warm clothing and monitor body temperature."},
    {temp:"24°C", weather:"Rainy", msg:"Avoid cold exposure and consume warm fluids."},
    {temp:"32°C", weather:"Humid", msg:"Stay hydrated and avoid outside heat for long time."}
];

window.onload = function(){
    let t = tips[Math.floor(Math.random()*tips.length)];
    document.getElementById("weatherText").innerText = "Temperature: " + t.temp + " | Weather: " + t.weather;
    document.getElementById("healthTip").innerText = t.msg;
}
</script>

</body>
</html>
